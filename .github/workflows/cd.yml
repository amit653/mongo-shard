name: CD - Deploy MongoDB Cluster

on:
  workflow_run:
    workflows: [ "CI - MongoDB Cluster Checks" ]
    types:
      - completed

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Deploy MongoDB cluster
        run: docker-compose -f docker-compose.yml up -d

      - name: Verify mongos router
        run: |
          docker exec mongos \
            mongo --port 27017 --eval "db.adminCommand('ping')"

