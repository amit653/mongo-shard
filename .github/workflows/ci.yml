name: CI - MongoDB Cluster Checks

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Install docker-compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose
       
      - name: Start MongoDB cluster
        run: docker-compose -f docker-compose.yml up -d

      - name: Wait for config servers
        run: sleep 10

      - name: Initiate config server replica set
        run: |
         docker exec configsvr1 mongosh --port 27019 --eval '
         rs.initiate({
        _id: "configReplSet",
        configsvr: true,
        members: [
          { _id: 0, host: "configsvr1:27019" },
          { _id: 1, host: "configsvr2:27019" }
        ]
        });
       rs.status();
        '

      - name: Verify mongos router
        run: |
          docker exec mongos \
            mongo --port 27017 --eval "db.adminCommand('ping')"

      - name: Run tests
        run: echo "Add your integration tests here"

      - name: Tear down
        if: always()
        run: docker-compose -f docker-compose.yml down

